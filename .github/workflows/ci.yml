name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # The workflow runs automatically on two events: a direct push to main, or when a pull request targets main.
  # Every other branch is ignored.


jobs:
  ci:
    runs-on: ubuntu-latest
  # Defines one job called ci. GitHub spins up a fresh Ubuntu virtual machine for it. Everything below runs
  # inside that VM.


    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  # GitHub starts a PostgreSQL Docker container before any step runs. The credentials come from your repository
  # secrets. The healthcheck polls pg_isready every 10s — steps only start once it passes, so the DB is
  # guaranteed ready. Port 5432 is mapped to the VM's localhost.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Clones repository into the VM. Without this, none of files exist yet.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Installs Node 20 on the VM. Uses a pre-built GitHub action so you don't have to do it manually.

      - name: Install dependencies
        run: npm install
        working-directory: api
      # Installs everything in api/package.json (Express, Jest, ESLint, etc.). working-directory means all commands
      # in this step run from the api/ folder.

      - name: Lint
        run: npm run lint
        working-directory: api
      #  Runs ESLint on src/ and tests/. If any rule is violated, ESLint exits with a non-zero code and the entire CI
      # job fails here — before even running tests.

      - name: Run tests
        run: npm test
        working-directory: api
      #  Runs Jest with --runInBand (sequential, as configured in package.json). The DB is mocked inside the tests so
      #  no PostgreSQL connection is needed here.

      - name: Build Docker image
        run: docker build -t trainshop-api ./api
      #  Builds the image from api/Dockerfile and tags it trainshop-api. If the Dockerfile is broken, CI fails here.

      - name: Start container
        run: |
          docker run -d \
            --name trainshop-api-test \
            --network=host \
            -e API_PORT=3000 \
            -e DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }} \
            trainshop-api

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $i/15 — waiting..."
            sleep 2
          done
          echo "API did not respond in time"
          docker logs trainshop-api-test
          exit 1
  #           Polls /health up to 15 times (30 seconds total) waiting for the API to start. If it never responds, it
  # prints the container logs to help debug, then fails the job.


      - name: Test /health route
        run: |
          response=$(curl -sf http://localhost:3000/health)
          echo "$response"
          echo "$response" | grep '"status":"ok"'

      - name: Clean up container
        if: always()
        run: docker rm -f trainshop-api-test
#  if: always() means this step runs even if a previous step failed. It removes the container so the VM doesn't
#    accumulate orphan containers. Without this, a failed job would leave the container running until GitHub
#   kills the VM.
